<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Invoice Pipeline</title>
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-8 max-w-6xl mx-auto h-screen flex flex-col">
  <header class="flex justify-between items-end mb-8">
    <div>
      <h1 class="text-3xl font-light tracking-tight text-slate-800">Invoice Pipeline</h1>
      <p class="text-sm text-slate-500 mt-1">Extracted and routed inputs from vendor emails</p>
    </div>
    <div class="flex gap-2 items-center">
      <input type="text" id="search-input" placeholder="Search vendor or invoice #..." class="px-3 py-1.5 bg-white border border-slate-200 rounded-md text-sm shadow-sm text-slate-600 focus:outline-none border focus:border-blue-400" oninput="filterResults()">
      <button class="px-4 py-1.5 bg-white border border-slate-200 rounded-full text-sm shadow-sm text-slate-600 hover:bg-slate-50">Filter</button>
      <button class="px-4 py-1.5 bg-white border border-slate-200 rounded-full text-sm shadow-sm text-slate-600 hover:bg-slate-50">Sort</button>
    </div>
  </header>

  <div 
    id="drop-zone" 
    class="border-2 border-dashed border-slate-300 rounded-lg bg-white p-12 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-colors mb-8"
    onclick="document.getElementById('file-upload').click()"
  >
    <input type="file" id="file-upload" multiple class="hidden" accept=".pdf,.png,.jpg,.jpeg" onchange="handleFiles(this.files)">
    <div class="mx-auto w-12 h-12 mb-4 text-slate-400">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
      </svg>
    </div>
    <h3 class="text-sm font-semibold text-slate-800">Upload mock vendor emails (PDF/Images)</h3>
    <p class="text-xs text-slate-500 mt-1">Drag and drop or click to select multiple invoices/credit notes</p>
    <div id="loading-indicator" class="hidden mt-4 text-blue-600 text-sm font-medium">Processing files... Please wait. This can take up to 20 seconds.</div>
  </div>

  <div class="flex-1 bg-white border border-slate-200 rounded-lg p-6 overflow-auto shadow-sm" id="results-container">
    <div id="empty-state" class="h-full flex items-center justify-center text-sm text-slate-400">
      No logs yet. Upload files to start the pipeline.
    </div>
    <div id="results-list" class="flex flex-col gap-4 hidden">
    </div>
  </div>

<script>
  const dropZone = document.getElementById('drop-zone');
  
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('border-blue-400', 'bg-blue-50/50');
  });
  
  dropZone.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-blue-400', 'bg-blue-50/50');
  });
  
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-blue-400', 'bg-blue-50/50');
    if (e.dataTransfer.files.length > 0) {
      handleFiles(e.dataTransfer.files);
    }
  });

  async function handleFiles(files) {
    if(files.length === 0) return;
    
    document.getElementById('loading-indicator').classList.remove('hidden');
    
    const formData = new FormData();
    for (const file of files) {
      formData.append('files', file);
    }

    try {
      const response = await fetch('/process', {
        method: 'POST',
        body: formData
      });
      
      const contentType = response.headers.get('content-type');
      if (contentType && contentType.includes('application/json')) {
        const data = await response.json();
        if (response.ok) {
          renderResults(data.results);
        } else {
          console.error("Server API Error:", data);
          alert('Error processing files: ' + JSON.stringify(data));
        }
      } else {
        const text = await response.text();
        console.error("Non-JSON Response status:", response.status, "Body:", text.substring(0, 200));
        alert('Server returned an invalid response. Check console logs. Status: ' + response.status);
      }
    } catch (error) {
      console.error(error);
      alert('Error processing files. See console.');
    } finally {
      document.getElementById('loading-indicator').classList.add('hidden');
      document.getElementById('file-upload').value = ''; // reset
    }
  }

  function filterResults() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const cards = document.querySelectorAll('.result-card');
    cards.forEach(card => {
      const vendor = card.getAttribute('data-vendor') || '';
      const invoice = card.getAttribute('data-invoice') || '';
      if (vendor.includes(query) || invoice.includes(query)) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  }

  function renderResults(results) {
    document.getElementById('empty-state').classList.add('hidden');
    const resultsList = document.getElementById('results-list');
    resultsList.classList.remove('hidden');

    results.forEach(res => {
      const isSuccess = res.status === 'success';
      const color = isSuccess ? 'emerald' : 'red';
      
      let detailsHtml = '';
      if(isSuccess && res.data) {
        detailsHtml = `
          <div class="mt-3 bg-slate-50 p-4 border border-slate-100 rounded text-xs font-mono text-slate-700 overflow-x-auto">
            <div class="grid grid-cols-2 gap-4 mb-2">
              <div><span class="text-slate-400">Vendor:</span> <span class="font-bold text-slate-800">${res.data.vendor_name || 'N/A'}</span></div>
              <div><span class="text-slate-400">Total Amount:</span> <span class="font-bold text-amber-600">${res.data.total_amount || 'N/A'}</span></div>
              <div><span class="text-slate-400">Invoice #:</span> <span class="text-emerald-600">${res.data.invoice_number || 'N/A'}</span></div>
              <div><span class="text-slate-400">Date:</span> <span class="text-slate-800">${res.data.date || 'N/A'}</span></div>
            </div>
            <div class="mt-2 text-slate-400">Items:</div>
            <ul class="list-disc pl-5 mt-1">
              ${(res.data.line_items || []).map(i => `<li>${i.description} (${i.quantity}) - ${i.price}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      const card = document.createElement('div');
      card.className = `result-card border border-${color}-200 bg-${color}-50/30 p-4 rounded-lg`;
      
      if (isSuccess && res.data) {
        card.setAttribute('data-vendor', (res.data.vendor_name || '').toLowerCase());
        card.setAttribute('data-invoice', (res.data.invoice_number || '').toLowerCase());
      } else {
        card.setAttribute('data-vendor', '');
        card.setAttribute('data-invoice', '');
      }

      card.innerHTML = `
        <div class="flex justify-between items-start">
          <div>
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-${color}-500"></span>
              <h4 class="font-bold text-slate-800">${res.file}</h4>
            </div>
            <p class="text-sm text-slate-600 mt-1">${res.reason || ''}</p>
          </div>
          <div class="text-right">
            ${isSuccess ? `
              <div class="text-xs font-bold px-2 py-1 bg-white border border-${color}-200 rounded text-${color}-700 inline-block mb-1 shadow-sm">
                ROUTE: ${res.route || 'UNKNOWN'}
              </div>
              <div class="text-[10px] text-slate-500 uppercase tracking-wide">
                CLASS: ${res.classification || ''}
              </div>
            ` : `
              <div class="text-xs font-bold px-2 py-1 bg-red-100 text-red-700 rounded inline-block">FAILED</div>
            `}
          </div>
        </div>
        ${detailsHtml}
      `;
      
      // prepend to show latest first
      resultsList.insertBefore(card, resultsList.firstChild);
    });
  }
</script>
</body>
</html>
